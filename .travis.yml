# http://travis-ci.org/#!/gjhiggins/FuXi
language: python
sudo: false
# whitelist
branches:
  only:
    - master

python:
    - 3.13

env:
    - TOX_ENV=flake
    - TOX_ENV=docs
    - TOX_ENV=cover
    - TOX_ENV=py313
    - TOX_ENV=docs-linkcheck

install:
    - python -m pip install uv
    - uv pip install tox

script:
    tox -e $TOX_ENV

after_success:
    - if [[ $HAS_COVERALLS ]] ; then coveralls ; fi

notifications:
    email: false
