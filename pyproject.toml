[project]
name = "fuxi"
version = "1.4"
description = "An OWL / N3-based in-memory, logic reasoning system for RDF"
requires-python = ">=3.13"
license = {text = "Apache"}
authors = [{name = "Chime Ogbuji", email = "chimezie@gmail.com"}]
maintainers = [{name = "RDFLib Team", email = "rdflib-dev@google.com"}]
readme = "README.md"
keywords = ["python", "logic", "owl", "rdf", "dlp", "n3", "rule", "reasoner"]
classifiers = [
    "Programming Language :: Python",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.13",
    "License :: OSI Approved :: Apache Software License",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Operating System :: OS Independent",
    "Natural Language :: English",
]
dependencies = [
    "html5lib",
    "isodate",
    "pyparsing",
    "SPARQLWrapper",
    "rdflib>=7.4,<7.5",
]

[project.optional-dependencies]
dev = [
    "black",
    "coverage",
    "mypy",
    "pylint",
    "pytest",
    "pytest-cov",
    "pyupgrade",
    "radon",
    "ruff",
    "vulture",
    "lizard",
    "xenon",
    "wily",
]

[project.scripts]
fuxi = "fuxi.Rete.CommandLine:main"

[project.urls]
Homepage = "https://github.com/RDFLib/FuXi"

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
zip-safe = false

[tool.setuptools.package-dir]
fuxi = "lib"
FuXi = "lib"

[tool.setuptools.packages.find]
where = ["lib"]
include = ["fuxi*", "FuXi*"]

[tool.pytest.ini_options]
testpaths = ["test"]
addopts = ["-ra"]
markers = [
    "unit: fast isolated tests",
    "integration: multi-component tests",
    "slow: long-running tests",
    "webtest: network-dependent tests",
    "known_issue: expected failures for tracked issues",
]

[tool.pyupgrade]
target-version = "py313"

[tool.ruff]
target-version = "py313"

[tool.ruff.lint]
select = ["UP"]

[tool.coverage.run]
source = ["fuxi"]
omit = [
    "*/test/*",
    "*/tests/*",
]
branch = true

[tool.coverage.report]
show_missing = true
skip_covered = false
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
]
