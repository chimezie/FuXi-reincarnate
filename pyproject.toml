[project]
name = "fuxi"
version = "1.4"
description = "An OWL / N3-based in-memory, logic reasoning system for RDF"
requires-python = ">=3.12"
license = {text = "Apache"}
authors = [{name = "Chime Ogbuji", email = "chimezie@gmail.com"}]
maintainers = [{name = "Chime Ogbuji", email = "chimezie@gmail.com"}]
readme = "README.md"
keywords = ["python", "logic", "owl", "rdf", "dlp", "n3", "rule", "reasoner"]
classifiers = [
    "Programming Language :: Python",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.13",
    "License :: OSI Approved :: Apache Software License",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Operating System :: OS Independent",
    "Natural Language :: English",
]
dependencies = [
    "html5lib",
    "isodate",
    "pyparsing",
    "SPARQLWrapper",
    "rdflib>=7.4",
]

[project.optional-dependencies]
dev = [
    "black",
    "coverage",
    "mypy",
    "pylint",
    "pytest",
    "pytest-cov",
    "pyupgrade",
    "radon",
    "ruff",
    "vulture",
    "lizard",
    "xenon",
    "wily",
]

[project.scripts]
fuxi = "fuxi.Rete.CommandLine:main"

[project.urls]
Homepage = "https://github.com/RDFLib/FuXi"

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
zip-safe = false

[tool.setuptools.package-dir]
"" = "lib"

[tool.setuptools.packages.find]
where = ["lib"]
include = ["fuxi*"]

[tool.pytest.ini_options]
testpaths = ["test"]
python_files = ["test_*.py"]
addopts = [
    "-ra",
    "--strict-markers",
    "--tb=short",
]
markers = [
    "integration: slower integration-style tests",
    "slow: slow tests",
]

[tool.fuxi.testing]
owl_cli = "uv run --active pytest test/testOWL.py"
owl_strategy_default = "bfp"

[tool.pyupgrade]
target-version = "py313"

[tool.ruff]
target-version = "py313"

[tool.ruff.lint]
select = ["UP"]

[tool.mypy]
python_version = "3.13"
files = ["lib"]
ignore_missing_imports = true
check_untyped_defs = false
disallow_incomplete_defs = false
warn_unused_ignores = true
warn_return_any = false
warn_redundant_casts = false
warn_unreachable = false
disallow_any_generics = false
disallow_subclassing_any = false
disallow_untyped_defs = false

[[tool.mypy.overrides]]
module = [
    "fuxi.Horn.PositiveConditions",
    "fuxi.Rete.RuleStore",
    "fuxi.Rete.Network",
    "fuxi.Horn.HornRules",
]
check_untyped_defs = true
warn_unused_ignores = true

[[tool.mypy.overrides]]
module = [
    "fuxi.SPARQL",
    "fuxi.SPARQL.BackwardChainingStore",
    "fuxi.LP.BackwardFixpointProcedure",
]
check_untyped_defs = true
disallow_incomplete_defs = true
warn_return_any = true

[tool.coverage.run]
source = ["fuxi"]
omit = [
    "*/test/*",
    "*/tests/*",
    "*/.venv/*",
    "*/.tox/*",
]
branch = true

[tool.coverage.report]
precision = 2
show_missing = true
skip_covered = false
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.:",
    "raise NotImplementedError",
    "if TYPE_CHECKING:",
]
