[tox]
envlist =
    flake,py313,cover,docs,docs-linkcheck

[testenv:flake]
deps = flake8
basepython = python3.13
commands = flake8 --exclude=tools,examples --max-line-length=350 --ignore=W291,W292,W391,F821,N805 lib

[testenv:py313]
basepython = python3.13
commands =
    {envpython} -m pytest
deps =
    pytest
    isodate
    lxml
    rdflib>=7.4,<7.5

[testenv:cover]
basepython = python3.13
commands =
    {envpython} -m pytest --cov=FuXi --cov-report=term-missing --cov-report=html
deps =
    coverage
    pytest
    pytest-cov
    lxml
    rdflib>=7.4,<7.5

###########################
# Run docs builder
###########################
[testenv:docs]
deps =
    sphinx
    sphinx_rtd_theme
basepython = python3.13
commands =
    sphinx-build -b html -d {envtmpdir}/doctrees docs docs/_build/html


###########################
# Run docs linkcheck
###########################

[testenv:docs-linkcheck]
deps = {[testenv:docs]deps}
basepython = python3.13
commands =
    sphinx-build -b html -d {envtmpdir}/doctrees docs docs/_build/html
    sphinx-build -b linkcheck docs docs/_build/html
